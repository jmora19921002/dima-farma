<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin conexión - DimaFarm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8eb 100%);
        }
        .offline-card {
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .offline-icon {
            font-size: 4rem;
            color: #6c757d;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="card offline-card text-center p-5">
        <div class="card-body">
            <i class="fas fa-wifi offline-icon mb-4"></i>
            <h3 class="mb-3">Sin conexión</h3>
            <p class="text-muted mb-4">
                Parece que perdiste la conexión a internet. 
                Algunos funciones pueden no estar disponibles.
            </p>
            <button onclick="window.location.reload()" class="btn btn-primary btn-lg">
                <i class="fas fa-redo me-2"></i>Reintentar
            </button>
        </div>
    </div>
</body>
</html>

{% extends "base.html" %}

{% block title %}Registro | {{ pharmacy.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <i class="fas fa-user-plus fa-3x mb-3" style="color: {{ pharmacy.theme_color }};"></i>
                    <h2 class="h3 mb-1">Crear Cuenta</h2>
                    <p class="text-muted">Regístrate en {{ pharmacy.name }}</p>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Nombre Completo</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0">
                                <i class="fas fa-user text-muted"></i>
                            </span>
                            <input type="text" class="form-control border-start-0 ps-0" id="name" name="name" required
                                placeholder="Tu nombre">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Correo Electrónico</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0">
                                <i class="fas fa-envelope text-muted"></i>
                            </span>
                            <input type="email" class="form-control border-start-0 ps-0" id="email" name="email"
                                required placeholder="ejemplo@correo.com">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0">
                                <i class="fas fa-lock text-muted"></i>
                            </span>
                            <input type="password" class="form-control border-start-0 ps-0" id="password"
                                name="password" required placeholder="Mínimo 6 caracteres">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-12">
                            <label for="phone" class="form-label">Teléfono (Opcional)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="fas fa-phone text-muted"></i>
                                </span>
                                <input type="tel" class="form-control border-start-0 ps-0" id="phone" name="phone"
                                    placeholder="Ej: 04121234567">
                            </div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="address" class="form-label">Dirección (Opcional)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0">
                                <i class="fas fa-map-marker-alt text-muted"></i>
                            </span>
                            <textarea class="form-control border-start-0 ps-0" id="address" name="address" rows="2"
                                placeholder="Tu dirección para envíos"></textarea>
                        </div>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary btn-lg"
                            style="background-color: {{ pharmacy.theme_color }}; border-color: {{ pharmacy.theme_color }};">
                            Registrarse
                        </button>
                    </div>

                    <div class="text-center">
                        <span class="text-muted">¿Ya tienes cuenta?</span>
                        <a href="{{ url_for('pharmacy_login', slug=pharmacy.slug) }}" class="text-decoration-none ms-1"
                            style="color: {{ pharmacy.theme_color }};">Inicia Sesión</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

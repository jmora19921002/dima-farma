{% extends "base.html" %}

{% block title %}Iniciar Sesión | {{ pharmacy.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <i class="fas fa-sign-in-alt fa-3x mb-3" style="color: {{ pharmacy.theme_color }};"></i>
                    <h2 class="h3 mb-1">Bienvenido</h2>
                    <p class="text-muted">Inicia sesión en {{ pharmacy.name }}</p>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">Correo Electrónico</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0">
                                <i class="fas fa-envelope text-muted"></i>
                            </span>
                            <input type="email" class="form-control border-start-0 ps-0" id="email" name="email"
                                required placeholder="ejemplo@correo.com">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0">
                                <i class="fas fa-lock text-muted"></i>
                            </span>
                            <input type="password" class="form-control border-start-0 ps-0" id="password"
                                name="password" required placeholder="Tu contraseña">
                        </div>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary btn-lg"
                            style="background-color: {{ pharmacy.theme_color }}; border-color: {{ pharmacy.theme_color }};">
                            Entrar
                        </button>
                    </div>

                    <div class="text-center">
                        <span class="text-muted">¿No tienes cuenta?</span>
                        <a href="{{ url_for('pharmacy_register', slug=pharmacy.slug) }}"
                            class="text-decoration-none ms-1" style="color: {{ pharmacy.theme_color }};">Regístrate</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
